version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgresql
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: customer_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mock-server:
    build: 
      context: ./mock-server
    ports:
      - "5000:5000"

  pipeline-service:
    build: 
      context: ./pipeline-service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgresql:admin@db:5432/customer_db
      MOCK_SERVER_URL: http://mock-server:5000
    depends_on:
      - db
      - mock-server

volumes:
  postgres_data:
